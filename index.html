<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis - Phân Tích Cảm Xúc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .result-box { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6 underline">ĐỀ 5: PHÂN TÍCH CẢM XÚC KHÁCH HÀNG</h1>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Nhập phản hồi khách hàng:</label>
            <textarea id="userInput" rows="4" 
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Ví dụ: Sản phẩm rất tốt, giao hàng nhanh tuyệt vời..."></textarea>
        </div>

        <button onclick="analyzeSentiment()" id="btnAnalyze"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">
            Phân Tích Ngay (AI Studio)
        </button>

        <div id="resultContainer" class="hidden mt-8 p-6 rounded-lg text-center result-box border-2">
            <p class="text-sm uppercase tracking-widest font-bold opacity-70">Kết quả phân tích</p>
            <h2 id="sentimentLabel" class="text-3xl font-black my-2">--</h2>
            <p id="sentimentScore" class="italic text-gray-600"></p>
        </div>

        <div id="loading" class="hidden mt-4 text-center text-blue-500 font-medium italic">
            Đang gửi dữ liệu lên AI Studio...
        </div>
    </div>

    <script type="module">
        // Import Google Generative AI thư viện từ CDN
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // --- CẤU HÌNH API KEY CỦA BẠN TẠI ĐÂY ---
        const API_KEY = "THAY_THE_API_KEY_CUA_BAN_TAI_DAY";

        async function analyzeSentiment() {
            const text = document.getElementById('userInput').value;
            const btn = document.getElementById('btnAnalyze');
            const resultBox = document.getElementById('resultContainer');
            const loading = document.getElementById('loading');

            if (!text.trim()) {
                alert("Vui lòng nhập văn bản!");
                return;
            }

            // Hiển thị trạng thái đang xử lý
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');
            btn.disabled = true;

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "Bạn là chuyên gia phân tích cảm xúc. Hãy đọc đoạn văn bản và trả về kết quả theo định dạng JSON: {\"label\": \"Tích cực\" | \"Tiêu cực\" | \"Trung lập\", \"score\": \"1-5\", \"reason\": \"lý do ngắn gọn\"}. Chỉ trả về JSON, không nói gì thêm."
                });

                const result = await model.generateContent(text);
                const response = await result.response;
                const data = JSON.parse(response.text());

                displayResult(data);
            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra khi gọi AI. Hãy kiểm tra API Key!");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function displayResult(data) {
            const resultBox = document.getElementById('resultContainer');
            const label = document.getElementById('sentimentLabel');
            const score = document.getElementById('sentimentScore');

            resultBox.classList.remove('hidden');
            label.innerText = data.label;
            score.innerText = Điểm: ${data.score}/5 - ${data.reason};

            // Thay đổi màu sắc dựa trên cảm xúc
            resultBox.className = "mt-8 p-6 rounded-lg text-center result-box border-2 ";
            if (data.label === "Tích cực") {
                resultBox.classList.add("bg-green-100", "border-green-500", "text-green-800");
            } else if (data.label === "Tiêu cực") {
                resultBox.classList.add("bg-red-100", "border-red-500", "text-red-800");
            } else {
                resultBox.classList.add("bg-yellow-100", "border-yellow-500", "text-yellow-800");
            }
        }

        // Gán hàm vào window để nút HTML có thể gọi được
        window.analyzeSentiment = analyzeSentiment;
    </script>
</body>
</html>
